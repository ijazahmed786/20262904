name: Deploy to Azure VM (Apache Web)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup SSH key
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 20.205.19.38 >> ~/.ssh/known_hosts

      # 3. Deploy to Azure VM
      - name: Deploy Files to /var/www/html
        run: |
          ssh root123@20.205.19.38 << 'EOF'

            echo "Connecting to server..."

            # Go to home directory
            cd /home/root123

            # Clone repo if not exists
            if [ ! -d "20262904" ]; then
              git clone https://github.com/ijazahmed786/20262904.git
            fi

            cd 20262904

            # Pull latest code
            git pull origin main

            echo "Deploying to Apache directory..."

            # Clean old web files
             rm -rf /var/www/html/*

            # Copy new files (index.html etc.)
             cp -r * /var/www/html/

            # Fix permissions
             chmod -R 755 /var/www/html

            echo "Deployment successful!"

          EOF
